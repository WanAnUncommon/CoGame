<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CoGame - 本地 Codex 能力构筑界面">
  <title>CoGame // Codex Loadout</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="screen-noise" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="#equipment" aria-label="CoGame 装备页">COGAME</a>
      <nav class="tabs" aria-label="主要页面">
        <button class="tab is-active" type="button" data-view="equipment" aria-selected="true">装备</button>
        <button class="tab" type="button" data-view="plugins" aria-selected="false">插件</button>
        <button class="tab" type="button" data-view="missions" aria-selected="false">任务</button>
        <button class="tab" type="button" data-view="wardrobe" aria-selected="false">装扮</button>
      </nav>
      <button class="refresh-button" id="refresh-button" type="button" aria-label="重新扫描本地 Codex 配置" title="重新扫描"><span aria-hidden="true">↻</span></button>
    </header>

    <div class="notice" id="notice" role="status" aria-live="polite">正在读取本地 Codex 配置…</div>

    <main>
      <section class="view is-active" id="view-equipment" aria-labelledby="equipment-heading">
        <h1 class="sr-only" id="equipment-heading">装备</h1>
        <div class="equipment-layout character-view-layout">
          <section class="data-zone mcp-zone" aria-labelledby="mcp-zone-heading">
            <div class="zone-heading"><h2 id="mcp-zone-heading">MCP</h2><span id="mcp-count">00</span></div>
            <div class="slot-grid mcp-grid" id="mcp-list" aria-live="polite"></div>
            <nav class="pagination" aria-label="MCP 翻页">
              <span class="total-count">共 <b id="mcp-total">0</b> 条</span>
              <button id="mcp-prev" type="button" aria-label="上一页 MCP">‹</button>
              <span class="page-number is-current" id="mcp-page-number">1</span>
              <span class="page-total" id="mcp-page-total">/ 1</span>
              <button id="mcp-next" type="button" aria-label="下一页 MCP">›</button>
            </nav>
          </section>

          <section class="character-stage" aria-label="Codex 宠物模型">
            <div class="character-aura" aria-hidden="true"></div>
            <div class="codex-pet" id="equipment-avatar" role="img" aria-label="Codex 默认像素宠物"></div>
          </section>

          <section class="data-zone skill-zone" aria-labelledby="skill-zone-heading">
            <div class="zone-heading"><h2 id="skill-zone-heading">Skills</h2><span id="skill-count">00</span></div>
            <div class="slot-grid skill-grid" id="skill-list" aria-live="polite"></div>
            <nav class="pagination" aria-label="Skills 翻页">
              <span class="total-count">共 <b id="skill-total">0</b> 条</span>
              <button id="skill-prev" type="button" aria-label="上一页 Skills">‹</button>
              <span class="page-number is-current" id="skill-page-number">1</span>
              <span class="page-total" id="skill-page-total">/ 1</span>
              <button id="skill-next" type="button" aria-label="下一页 Skills">›</button>
            </nav>
          </section>
        </div>
      </section>

      <section class="view" id="view-plugins" aria-labelledby="plugins-heading" hidden>
        <h1 class="sr-only" id="plugins-heading">插件</h1>
        <div class="plugin-layout character-view-layout">
          <div class="plugin-rail plugin-rail-left" id="plugin-left" aria-live="polite"></div>
          <section class="character-stage" aria-label="Codex 插件连接宠物模型">
            <div class="character-aura" aria-hidden="true"></div>
            <div class="codex-pet" id="plugin-avatar" role="img" aria-label="Codex 默认像素宠物"></div>
          </section>
          <div class="plugin-rail plugin-rail-right" id="plugin-right" aria-live="polite"></div>
          <nav class="pagination plugin-pagination" aria-label="插件翻页">
            <span class="total-count">共 <b id="plugin-total">0</b> 条</span>
            <button id="plugin-prev" type="button" aria-label="上一页插件">‹</button>
            <span class="page-number is-current" id="plugin-page-number">1</span>
            <span class="page-total" id="plugin-page-total">/ 1</span>
            <button id="plugin-next" type="button" aria-label="下一页插件">›</button>
          </nav>
        </div>
      </section>

      <section class="view" id="view-missions" aria-labelledby="missions-heading" hidden>
        <h1 class="sr-only" id="missions-heading">任务</h1>
        <div class="mission-layout">
          <section class="mission-column" aria-label="定时任务列表"><div class="mission-list" id="mission-list" aria-live="polite"></div></section>
          <article class="mission-detail" id="mission-detail" aria-live="polite"><span class="detail-kicker">TASK DETAIL</span><div class="detail-empty">选择任务查看详情</div></article>
          <nav class="pagination mission-pagination" aria-label="任务翻页">
            <span class="total-count">共 <b id="mission-total">0</b> 条</span>
            <button id="mission-prev" type="button" aria-label="上一页任务">‹</button>
            <span class="page-number is-current" id="mission-page-number">1</span>
            <span class="page-total" id="mission-page-total">/ 1</span>
            <button id="mission-next" type="button" aria-label="下一页任务">›</button>
          </nav>
        </div>
      </section>

      <section class="view" id="view-wardrobe" aria-labelledby="wardrobe-heading" hidden>
        <h1 class="sr-only" id="wardrobe-heading">装扮</h1>
        <div class="wardrobe-layout">
          <section class="skin-catalog" aria-labelledby="skin-catalog-heading">
            <header class="skin-catalog-header">
              <span id="skin-catalog-status">SCANNING</span>
              <h2 id="skin-catalog-heading">可替换图片</h2>
            </header>
            <div class="skin-table-wrap">
              <table class="skin-table">
                <thead>
                  <tr><th scope="col">图片说明</th><th scope="col">格式</th><th scope="col">尺寸</th><th scope="col">状态</th></tr>
                </thead>
                <tbody id="skin-table-body"></tbody>
              </table>
            </div>
            <p class="skin-catalog-warning" id="skin-catalog-warning" role="status" hidden></p>
          </section>

          <section class="wardrobe-preview" aria-label="当前装扮预览">
            <span class="preview-label">CODEX SKIN PREVIEW</span>
            <div class="skin-preview-frame"><img id="wardrobe-avatar" alt="当前 Codex 皮肤预览"></div>
            <div class="appearance-summary">
              <div><strong id="appearance-name">等待扫描</strong><small id="skin-preview-meta">正在读取皮肤目录</small></div>
              <span>UNIT <b id="wardrobe-build-id">CG-000</b></span>
            </div>
            <div class="skin-runtime" aria-live="polite">
              <div class="skin-runtime-copy"><span class="skin-runtime-indicator" id="skin-runtime-indicator"></span><div><strong id="skin-runtime-label">检测运行环境</strong><small id="skin-runtime-detail">CODEX DREAM SKIN</small></div></div>
              <div class="skin-actions"><button id="restore-skin" type="button" disabled>恢复官方外观</button><button class="is-primary" id="apply-skin" type="button" disabled>应用皮肤</button></div>
            </div>
          </section>
          <nav class="pagination wardrobe-pagination" aria-label="装扮页码">
            <span class="total-count">共 <b id="skin-total">0</b> 项</span><button type="button" disabled aria-label="上一页装扮">‹</button><span class="page-number is-current">1</span><span class="page-total">/ 1</span><button type="button" disabled aria-label="下一页装扮">›</button>
          </nav>
        </div>
      </section>
    </main>

    <footer class="system-footer" aria-hidden="true">
      <span class="connection-dot"></span><span id="scan-time">等待扫描</span><span id="rules-strip">LOCAL SKIN CONTROL</span>
      <span>SKILL <b id="skill-stat">00</b></span><span>MCP <b id="gear-stat">00</b></span><span>TASK <b id="mission-stat">00</b></span>
    </footer>
  </div>

  <div class="detail-popover" id="detail-popover" role="tooltip" hidden></div>

  <template id="empty-slot-template"><div class="data-card is-empty" aria-hidden="true"></div></template>
  <script src="/app.js" defer></script>
</body>
</html>
